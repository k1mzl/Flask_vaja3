<html lang="" en">

<head>
    <title>Coin Flip</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body>
    <h1>met kovanca</h1>
    <div id="coin">Klikni gum za met</div>
    <img src="" alt="" id="slika">
    <input type="text" name="" id="vnos">
    <button onclick="btnClick()" type="button">FLIP</button>
</body>

</html>
<script>
    function btnClick() {
        var divCoin = document.getElementById("coin")
        var vnosInp=document.getElementById("vnos").value
        var Slike = document.getElementById("slika")

        console.log(vnosInp)
        $.ajax({
            url: "/coinData",
            data: {
                zipcode: 97201,
                vrednost: vnosInp

            },
            success: function (result) {
                console.log(result)
                divCoin.innerHTML = result.status
                Slike.src = result.img


                
            }
        });

        
        //console.log("Halo")
    }



</script>
